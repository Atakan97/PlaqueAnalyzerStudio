name: CD

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-to-railway:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
      RAILWAY_HEALTHCHECK_URL: ${{ secrets.RAILWAY_HEALTHCHECK_URL }}

    steps:
      - name: Skip deploy when hook is missing
        if: ${{ env.RAILWAY_DEPLOY_HOOK_URL == '' }}
        run: echo "RAILWAY_DEPLOY_HOOK_URL is not set. Deployment skipped."

      - name: Trigger Railway deploy hook
        if: ${{ env.RAILWAY_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"

      - name: Optional health check
        if: ${{ env.RAILWAY_DEPLOY_HOOK_URL != '' && env.RAILWAY_HEALTHCHECK_URL != '' }}
        run: |
          for i in {1..20}; do
            if curl -fsSL "$RAILWAY_HEALTHCHECK_URL" > /dev/null; then
              echo "Health check passed."
              exit 0
            fi
            echo "Service is not ready yet. Retry $i/20..."
            sleep 10
          done
          echo "Health check failed."
          exit 1


