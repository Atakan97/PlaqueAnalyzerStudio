name: CD

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-to-render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}

    steps:
      - name: Wait for Render deploy rollout
        run: sleep 45

      - name: Skip health check when URL is missing
        if: ${{ env.RENDER_HEALTHCHECK_URL == '' }}
        run: echo "RENDER_HEALTHCHECK_URL is not set. Health verification skipped."

      - name: Verify production health endpoint
        if: ${{ env.RENDER_HEALTHCHECK_URL != '' }}
        run: |
          for i in {1..20}; do
            response="$(curl -fsSL "$RENDER_HEALTHCHECK_URL" || true)"
            if echo "$response" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"'; then
              echo "Health check passed with status UP."
              exit 0
            fi
            echo "Service is not healthy yet. Retry $i/20..."
            sleep 15
          done
          echo "Health check failed after retries."
          exit 1
