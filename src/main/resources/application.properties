spring.application.name=plaque-calculator
# ric.jar.path is handled in RicService with default value

spring.devtools.sessions.restore=false
server.forward-headers-strategy=framework
server.tomcat.redirect-context-root=false

# Disable the main feature that keeps the session on every reboot
spring.session.store-type=none

# Completely prevent DevTools from reading session data from Tomcat
spring.devtools.restart.exclude=static/**, public/**, templates/**, **/*.html

# Optionally enable faster restart of DevTools
spring.devtools.restart.fail-fast=true

# Static Resources Cache Control (Disable cache in development)
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.chain.cache=false

# Admin credentials (override in Railway Variables)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:1234}

# PostgreSQL Database Settings (override in Railway Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/plaque_log_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:plaque_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:user123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
# Keep the defaults small and allow overriding with environment variables.
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:3}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Disable H2 console
spring.h2.console.enabled=false

# Disable session persistence between restarts to prevent trying reload old sessions
server.servlet.session.persistent=false

# Session timeout: 24 hours to prevent data loss during long normalization work
server.servlet.session.timeout=1440m

# Increase max HTTP header size for large datasets
server.max-http-request-header-size=128KB

# Dynamic port
server.port=${PORT:8080}